services:
  frontend:
    container_name: event-frontned
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - path: ./.env
        required: false
    environment:
      NODE_ENV: "${NODE_ENV:-development}"
      BACKEND_URL: "${BACKEND_URL:-http://localhost:8090}"
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:3090}"
    ports:
      - "3090:3090"
    depends_on:
      - backend
    networks:
      - event-network

  backend:
    container_name: event-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - path: ./.env
        required: false
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Development}"
      PORT: "${BACKEND_PORT:-8090}"
      DB_CONNECTION_STRING: "${DB_CONNECTION_STRING:-Server=mysql;Port=3306;Database=appdb;User=appuser;Password=apppass}"
      REDIS_URL: "${REDIS_URL:-redis:6379}"
      JWT_SECRET_ACCESS: "${JWT_SECRET_ACCESS:-amazing_secret_key_yup_yes_abcdef123}"
      JWT_SECRET_VERIFICATION: "${JWT_SECRET_VERIFICATION:-amazing_verification_secret_yup_yes_abcdef123}"
      RABBITMQ_URL: "${RABBITMQ_URL:-amqp://appuser:apppass@rabbitmq:5672}"
      ELASTICSEARCH_URL: "${ELASTICSEARCH_URL:-http://elasticsearch:9200}"
    ports:
      - "8090:8090"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - event-network

  worker:
    container_name: event-worker
    build:
      context: ./worker
      dockerfile: Dockerfile
    env_file:
      - path: ./.env
        required: false
    environment:
      APP_ENV: "${APP_ENV:-development}"
      DB_CONNECTION_STRING: "${DB_CONNECTION_STRING:-Server=mysql;Port=3306;Database=appdb;User=appuser;Password=apppass}"
      RABBIT_CONNECTION: "${RABBIT_CONNECTION:-amqp://appuser:apppass@rabbitmq:5672}"
      REDIS_CONNECTION: "${REDIS_CONNECTION:-redis:6379}"
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:3090}"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - event-network
    restart: unless-stopped

  mysql:
    container_name: event-mysql
    image: mysql:8.4
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-root}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-appdb}"
      MYSQL_USER: "${MYSQL_USER:-appuser}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:-apppass}"
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - event-network

  redis:
    container_name: event-redis
    image: redis:7-alpine
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - event-network

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: event-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_DEFAULT_USER:-appuser}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_DEFAULT_PASS:-apppass}"
      RABBITMQ_DEFAULT_VHOST: "${RABBITMQ_DEFAULT_VHOST:-/}"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - event-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.16.1
    container_name: event-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.http.ssl.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - event-network

networks:
  event-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  elasticsearch_data:
